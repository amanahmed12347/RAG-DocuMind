services:
  - type: web
    name: documind-rag
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/springboot-rag-chatbot-0.0.1-SNAPSHOT.jar
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
