services:
  - type: web
    name: documind-rag
    runtime: docker
    repo: https://github.com/amanladji/DocuMind-RAG-Document-Intelligence-System
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
