<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RAG Chatbot</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            height: 100vh;
        }
        .auth-container {
            width: 400px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-container h1 { font-size: 24px; margin-bottom: 4px; }
        .auth-container .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 11px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
        .auth-footer a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo svg { width: 48px; height: 48px; color: #4f46e5; }
        .logo h1 { font-size: 20px; color: #1a1a2e; margin-top: 8px; }
        .logo p { font-size: 13px; color: #6b7280; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
                <path d="M20 18v2a4 4 0 01-4 4H8a4 4 0 01-4-4v-2"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <h1>Create Account</h1>
            <p>Get started with the RAG Chatbot</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="signupForm" autocomplete="off">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const errorEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorEl.classList.remove('show');

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Signup failed');
                }

                const data = await res.json();
                localStorage.setItem('rag_chatbot_token', data.token);
                localStorage.setItem('rag_chatbot_user', JSON.stringify({ email: data.email, name: data.name }));
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
